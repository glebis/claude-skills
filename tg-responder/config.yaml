daemon:
  db_path: ~/Brains/data/telegram/responder.db
  signal_method: file_flag
  signal_path: /tmp/tg-responder-signal
  batch_window_seconds: 30

worker:
  max_concurrent_agents: 1
  lease_duration_seconds: 300
  max_attempts: 3
  retry_delay_seconds: 60
  claude_timeout_seconds: 300
  claude_max_turns: 15
  stale_check: true

contacts:
  "Lora Vit":
    mode: auto
    cadence_days: 3
    tags: [family]
    timezone: Asia/Tbilisi

  "Yulia Katan":
    mode: draft_only
    cadence_days: 1
    tags: [partner]
    timezone: Europe/Berlin

  _course_inquiry:
    mode: auto_respond
    template: lab_signup
    detect_patterns:
      - "Хочу записаться на лабораторию"
      - "Хочу записаться на курс"

  _default:
    mode: draft_only

  _ignore:
    - "AGENCY Community Bot"
    - "Hermes"
    - "toolbuildingape_claude"
    - "FreeFeed"
    - "Таблица жизни"
    - "New Circle Pro"
    - "Один Вкус"
    - "Verity"

follow_ups:
  enabled: true
  default_schedule: exponential   # exponential | fixed | custom
  default_base_days: 3            # first reminder after N days
  default_max_reminders: 3        # archive after this many
  auto_archive_after_days: 30     # archive even if max not reached
  reminder_style: auto            # auto (Claude drafts) | manual (queue for user)
  scan_interval_hours: 12
  # Per-contact overrides (merge with contacts section)
  # "Lora Vit": { base_days: 2, max_reminders: 5, style: auto }

scan:
  chat_types: [dm]
  ignore_bots: true
  min_message_length: 1
